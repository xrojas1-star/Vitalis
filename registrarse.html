<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="registrarse.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-section">
            <div class="form-box">  
                    <div class="logo-container">
                    <img src="imagenes/logovitalis.png" class="main-logo" alt="Logo">
                </div>
                <h2>Crear cuenta</h2>
                <p class="subtitle">Regístrate y comienza tu camino hacia una vida más saludable</p>

                <form>
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Nombre completo">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Correo electrónico">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i> <input type="password" placeholder="Contraseña">
                        <i class="fa-solid fa-eye view-pass"></i> 
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Confirmar contraseña">
                        <i class="fa-solid fa-eye view-pass"></i>
                    </div>

                    <button type="submit" class="btn-register">Registrarse</button>
                </form>

                <p class="footer-text">¿Ya tienes cuenta? <a href="#">Inicia Sesión</a></p>
            </div>
        </div>

        <div class="image-section">
            </div>
    </div>
</body>
</html>
