<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="registrarseinglés.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-section">
            <div class="form-box">  
                    <div class="logo-container">
                    <img src="imagenes-inglés/logovitalis.png" class="main-logo" alt="Logo">
                </div>
                <h2>create account</h2>
                <p class="subtitle">Sign up and start your journey towards a healthier life</p>

                <form>
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i> <input type="password" placeholder="Password">
                        <i class="fa-solid fa-eye view-pass"></i> 
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Confirm Password">
                        <i class="fa-solid fa-eye view-pass"></i>
                    </div>

                    <button type="submit" class="btn-register">Register</button>
                </form>

                <p class="footer-text">Already have an account? <a href="#">Sign In</a></p>
            </div>
        </div>

        <div class="image-section">
            </div>
    </div>
</body>
</html>
